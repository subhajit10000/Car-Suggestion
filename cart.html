<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Page</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="car.html" class="nav-logo">Dream<span>Car</span></a>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Deals</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2>Your Cart</h2>
        <div class="cart-section">
            <div class="order-box">
                <h3>Order Details</h3>
                <hr>
                <div class="order-content">
                   <div id="cart-products" class="cart-list"></div>
                </div>
            </div>

            <div class="price-box">
                <h3>Price Details</h3>
                <div class="price-row">
                    <span>Price</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="price-row">
                    <span>Discount</span>
                    <span id="discount">₹0</span>
                </div>
                <div class="price-row">
                    <span>Delivery Charges</span>
                    <span>FREE</span>
                </div>
                <hr>
                <div class="price-row total">
                    <span>Total</span>
                    <span id="total">₹0</span>
                </div>
            </div>
        </div>

        <div class="buttons">
            <button class="continue">Continue Shopping</button>
            <button class="checkout">Checkout</button>
        </div>
    </div>

    <script type="module" src="cart.js"></script>
</body>
</html>
