    <style>
  body {
    background-image: url('car.avif');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }
  /* Add a subtle overlay so text stays readable */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    z-index: -1;
  }
</style>

  <nav class="navbar">

    <div class="main">
       <div class="img"> <img src="#" alt="#" id="product-img"></div>
